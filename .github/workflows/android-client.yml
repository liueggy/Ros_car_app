name: Android Client APK

on:
  push:
    branches: [ main ]
    paths:
      - 'android/EggyRosCar/**'
      - '.github/workflows/android-client.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle 8.5
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Build debug APK
        working-directory: android/EggyRosCar
        run: gradle assembleDebug --stacktrace

      - name: Rename APK
        run: |
          mkdir -p release
          cp android/EggyRosCar/app/build/outputs/apk/debug/*.apk release/EggyRosCar-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: EggyRosCar-debug-apk
          path: release/EggyRosCar-debug.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: Eggy ROS Car Android Latest
          body: |
            自动构建的 Eggy ROS Car Android debug APK。

            默认 WebSocket: wss://liueggy.live/ws
          files: release/EggyRosCar-debug.apk
          prerelease: false
          make_latest: true
