name: Android Client APK

on:
  push:
    branches: [ main ]
    paths:
      - 'android/EggyRosCar/**'
      - '.github/workflows/android-client.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mobile-latest-release
  cancel-in-progress: false

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle 8.5
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Build debug APK
        working-directory: android/EggyRosCar
        run: gradle assembleDebug --stacktrace

      - name: Rename APK
        run: |
          mkdir -p release
          cp android/EggyRosCar/app/build/outputs/apk/debug/*.apk release/EggyRosCar-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: EggyRosCar-debug-apk
          path: release/EggyRosCar-debug.apk

      - name: Publish APK to shared mobile Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mobile-latest
          name: Eggy ROS Car Mobile Latest
          body: |
            # Eggy ROS Car Mobile Latest

            同一个 Release 同时保留 Android APK 与 iOS IPA。两个平台可独立构建、独立更新，后发布的平台不会删除另一个平台的产物。

            ## Android 构建信息

            - Workflow Run：#${{ github.run_number }}
            - Commit：${{ github.sha }}
            - 默认 WebSocket：wss://liueggy.live/ws

            ## Android 产物

            - EggyRosCar-debug.apk

            iOS 产物由 iOS workflow 发布到同一个 Release：ROS Car-unsigned.ipa。
          files: release/EggyRosCar-debug.apk
          prerelease: false
          make_latest: true
