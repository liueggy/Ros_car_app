name: Android Client APK

on:
  push:
    branches: [ main ]
    paths:
      - 'android/EggyRosCar/**'
      - '.github/workflows/android-client.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: mobile-latest-release
  cancel-in-progress: false

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle 8.5
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Build debug APK
        working-directory: android/EggyRosCar
        run: gradle assembleDebug --stacktrace

      - name: Rename APK
        run: |
          mkdir -p release
          cp android/EggyRosCar/app/build/outputs/apk/debug/*.apk release/EggyRosCar-debug.apk

      - name: Generate Release notes
        run: |
          BUILD_TIME_UTC=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          echo "RELEASE_UPDATED_AT=${BUILD_TIME_UTC}" >> "$GITHUB_ENV"
          COMMIT_SHORT=$(git rev-parse --short HEAD)
          LAST_TAG=$(git tag --sort=-creatordate | grep -v '^mobile-latest$' | head -1 || true)
          if [ -n "$LAST_TAG" ]; then
            CHANGES=$(git log --pretty='- %s (%h)' "$LAST_TAG"..HEAD -- android/EggyRosCar .github/workflows/android-client.yml | head -20)
          else
            CHANGES=$(git log -5 --pretty='- %s (%h)' -- android/EggyRosCar .github/workflows/android-client.yml)
          fi
          if [ -z "$CHANGES" ]; then
            CHANGES=$(git log -5 --pretty='- %s (%h)')
          fi
          cat > release/android-release-notes.md <<EOF
          # Eggy ROS Car Mobile Latest

          这里放最新的手机端构建产物。Android 和 iOS 共用这个 Release，后发布的平台只会更新自己的文件。

          ## 本次 Android 更新

          ${CHANGES}

          ## Android 构建信息

          - 构建时间：${BUILD_TIME_UTC}
          - Workflow Run：#${GITHUB_RUN_NUMBER}
          - Commit：${COMMIT_SHORT}
          - 分支：${GITHUB_REF_NAME}
          - 默认 WebSocket：wss://liueggy.live/ws

          ## 当前产物

          - Android：EggyRosCar-debug.apk
          - iOS：ROS-Car-unsigned.ipa

          ## 说明

          APK 是 debug 包，方便直接安装测试。iOS 产物由 iOS workflow 发布到同一个 Release。
          EOF

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: EggyRosCar-debug-apk
          path: release/EggyRosCar-debug.apk

      - name: Publish APK to shared mobile Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mobile-latest
          name: Eggy ROS Car Mobile Latest - Android ${{ env.RELEASE_UPDATED_AT }}
          body_path: release/android-release-notes.md
          files: release/EggyRosCar-debug.apk
          prerelease: false
          make_latest: true
