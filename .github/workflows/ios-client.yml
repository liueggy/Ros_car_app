name: iOS Client Build

permissions:
  contents: write
  actions: read

on:
  push:
    branches: [ main ]
    paths:
      - 'ios/**'
      - '.github/workflows/ios-client.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    defaults:
      run:
        working-directory: ios/EggyRobotClient
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build unsigned app for device
        run: |
          xcodebuild \
            -project EggyRobotClient.xcodeproj \
            -scheme EggyRobotClient \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build-device \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Generate app bundle metadata for sideload signers
        run: |
          PLIST="build-device/Build/Products/Release-iphoneos/EggyRobotClient.app/Info.plist"
          set_plist() {
            /usr/libexec/PlistBuddy -c "Set :$1 $2" "$PLIST" 2>/dev/null || /usr/libexec/PlistBuddy -c "Add :$1 $3 $2" "$PLIST"
          }
          set_plist CFBundleExecutable EggyRobotClient string
          set_plist CFBundleIdentifier com.eggy.robot.client string
          set_plist CFBundleName EggyRobotClient string
          set_plist CFBundlePackageType APPL string
          set_plist LSRequiresIPhoneOS true bool
          plutil -lint "$PLIST"

      - name: Package unsigned IPA
        run: |
          APP_PATH=$(find build-device/Build/Products/Release-iphoneos -name 'EggyRobotClient.app' -type d | head -1)
          test -n "$APP_PATH"
          rm -rf Payload EggyRobotClient-unsigned.ipa
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          /usr/bin/zip -qry EggyRobotClient-unsigned.ipa Payload

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: EggyRobotClient-unsigned-ipa
          path: ios/EggyRobotClient/EggyRobotClient-unsigned.ipa

      - name: Generate unsigned Release notes
        run: |
          BUILD_TIME_UTC=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          COMMIT_SHORT=$(git rev-parse --short HEAD)
          cat > unsigned-release-notes.md <<EOF
          # EggyRobotClient 未签名 IPA

          最新构建已自动更新。

          ## 构建信息

          - 构建时间：${BUILD_TIME_UTC}
          - Workflow Run：#${GITHUB_RUN_NUMBER}
          - Commit：${COMMIT_SHORT}
          - 分支：${GITHUB_REF_NAME}
          - Bundle ID：com.eggy.robot.client
          - Minimum iOS：17.0

          ## 本次产物

          - EggyRobotClient-unsigned.ipa

          ## 说明

          这是未签名 IPA，不能直接安装。请使用轻松签、iOS App Signer、Sideloadly、AltStore 或你自己的证书重新签名后安装。

          ## 当前客户端能力

          - 连接 Ros_car_web WebSocket 中转服务
          - 实时显示小车状态、地图、雷达点、路径和目标点
          - 控制页显示实时小地图，可边看地图边控制小车
          - 支持手动控制、自动探索、重置、场景切换、保存/加载地图
          EOF

      - name: Create or update unsigned Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: unsigned-latest
          name: EggyRobotClient Unsigned Latest
          body_path: ios/EggyRobotClient/unsigned-release-notes.md
          files: ios/EggyRobotClient/EggyRobotClient-unsigned.ipa
          make_latest: true

      - name: Build unsigned app for simulator
        run: |
          xcodebuild \
            -project EggyRobotClient.xcodeproj \
            -scheme EggyRobotClient \
            -sdk iphonesimulator \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package simulator app artifact
        run: |
          APP_PATH=$(find build/Build/Products/Release-iphonesimulator -name 'EggyRobotClient.app' -type d | head -1)
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" EggyRobotClient-simulator.zip

      - name: Upload simulator artifact
        uses: actions/upload-artifact@v4
        with:
          name: EggyRobotClient-simulator
          path: ios/EggyRobotClient/EggyRobotClient-simulator.zip

  signed-ipa:
    runs-on: macos-15
    if: ${{ github.event_name == 'workflow_dispatch' }}
    defaults:
      run:
        working-directory: ios/EggyRobotClient
    steps:
      - uses: actions/checkout@v4
      - name: Check signing secrets
        env:
          IOS_CERTIFICATE_P12: ${{ secrets.IOS_CERTIFICATE_P12 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          if [ -z "$IOS_CERTIFICATE_P12" ] || [ -z "$IOS_CERTIFICATE_PASSWORD" ] || [ -z "$IOS_PROVISIONING_PROFILE" ]; then
            echo "Signing secrets are not configured; skip IPA export."
            echo "configured=false" >> "$GITHUB_ENV"
          else
            echo "configured=true" >> "$GITHUB_ENV"
          fi
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        run: xcodegen generate
      - name: Decode signing assets
        if: env.configured == 'true'
        env:
          IOS_CERTIFICATE_P12: ${{ secrets.IOS_CERTIFICATE_P12 }}
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          mkdir -p signing
          echo "$IOS_CERTIFICATE_P12" | base64 --decode > signing/cert.p12
          echo "$IOS_PROVISIONING_PROFILE" | base64 --decode > signing/profile.mobileprovision
      - name: Install signing assets
        if: env.configured == 'true'
        env:
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import signing/cert.p12 -k build.keychain -P "$IOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' /dev/stdin <<< $(security cms -D -i signing/profile.mobileprovision))
          cp signing/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
      - name: Archive
        if: env.configured == 'true'
        run: |
          xcodebuild -project EggyRobotClient.xcodeproj -scheme EggyRobotClient -configuration Release -archivePath build/EggyRobotClient.xcarchive archive
      - name: Export IPA
        if: env.configured == 'true'
        run: |
          cat > ExportOptions.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict><key>method</key><string>ad-hoc</string><key>signingStyle</key><string>automatic</string></dict></plist>
          PLIST
          xcodebuild -exportArchive -archivePath build/EggyRobotClient.xcarchive -exportPath build/export -exportOptionsPlist ExportOptions.plist
      - name: Create GitHub Release
        if: env.configured == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ios-client-${{ github.run_number }}
          name: EggyRobotClient iOS ${{ github.run_number }}
          files: ios/EggyRobotClient/build/export/*.ipa
