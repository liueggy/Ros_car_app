name: EggyRobotClient
options:
  bundleIdPrefix: com.eggy
  deploymentTarget:
    iOS: "17.0"
settings:
  MARKETING_VERSION: "0.1.0"
  CURRENT_PROJECT_VERSION: "1"
targets:
  EggyRobotClient:
    type: application
    platform: iOS
    sources:
      - Sources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.eggy.robot.client
      INFOPLIST_FILE: Sources/Info.plist
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      CODE_SIGN_STYLE: Automatic
    scheme:
      testTargets:
        - EggyRobotClientTests
  EggyRobotClientTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: EggyRobotClient
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.eggy.robot.client.tests
